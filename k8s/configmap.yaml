apiVersion: v1
kind: ConfigMap
metadata:
  name: liberu-maintenance-config
  namespace: liberu-maintenance
  labels:
    app.kubernetes.io/name: liberu-maintenance
data:
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: "https://maintenance.liberu.co.uk"
  LOG_CHANNEL: stack
  LOG_LEVEL: warning
  BROADCAST_DRIVER: reverb
  CACHE_DRIVER: redis
  FILESYSTEM_DISK: local
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
  SESSION_LIFETIME: "120"
  OCTANE_SERVER: roadrunner
  CONTAINER_MODE: http
  WITH_SCHEDULER: "true"
  WITH_HORIZON: "false"
  WITH_REVERB: "false"
  DB_CONNECTION: mysql
  DB_PORT: "3306"
  REDIS_PORT: "6379"
  MAIL_MAILER: smtp
  MULTITENANCY: "false"
