apiVersion: apps/v1
kind: Deployment
metadata:
  name: liberu-maintenance-app
  namespace: liberu-maintenance
  labels:
    app.kubernetes.io/name: liberu-maintenance
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: liberu-maintenance-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: liberu-maintenance-app
        app.kubernetes.io/name: liberu-maintenance
        app.kubernetes.io/component: app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: liberu/maintenance:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
            - containerPort: 8080
              name: health
              protocol: TCP
          envFrom:
            - configMapRef:
                name: liberu-maintenance-config
            - secretRef:
                name: liberu-maintenance-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ['healthcheck']
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /up
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage/app
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: liberu-maintenance-storage
      terminationGracePeriodSeconds: 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liberu-maintenance-horizon
  namespace: liberu-maintenance
  labels:
    app.kubernetes.io/name: liberu-maintenance
    app.kubernetes.io/component: horizon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: liberu-maintenance-horizon
  template:
    metadata:
      labels:
        app: liberu-maintenance-horizon
        app.kubernetes.io/name: liberu-maintenance
        app.kubernetes.io/component: horizon
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: horizon
          image: liberu/maintenance:latest
          imagePullPolicy: Always
          env:
            - name: CONTAINER_MODE
              value: horizon
          envFrom:
            - configMapRef:
                name: liberu-maintenance-config
            - secretRef:
                name: liberu-maintenance-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage/app
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: liberu-maintenance-storage
---
