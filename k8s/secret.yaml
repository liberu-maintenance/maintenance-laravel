apiVersion: v1
kind: Secret
metadata:
  name: liberu-maintenance-secrets
  namespace: liberu-maintenance
  labels:
    app.kubernetes.io/name: liberu-maintenance
type: Opaque
stringData:
  APP_KEY: "base64:REPLACE_WITH_APP_KEY"
  DB_HOST: "mysql.liberu-maintenance.svc.cluster.local"
  DB_DATABASE: liberu_maintenance
  DB_USERNAME: liberu
  DB_PASSWORD: REPLACE_WITH_DB_PASSWORD
  REDIS_HOST: "redis.liberu-maintenance.svc.cluster.local"
  REDIS_PASSWORD: REPLACE_WITH_REDIS_PASSWORD
  MAIL_HOST: REPLACE_WITH_MAIL_HOST
  MAIL_PORT: "587"
  MAIL_USERNAME: REPLACE_WITH_MAIL_USERNAME
  MAIL_PASSWORD: REPLACE_WITH_MAIL_PASSWORD
  MAIL_FROM_ADDRESS: noreply@liberu.co.uk
  MAIL_FROM_NAME: "Liberu Maintenance"
  REVERB_APP_ID: REPLACE_WITH_REVERB_APP_ID
  REVERB_APP_KEY: REPLACE_WITH_REVERB_APP_KEY
  REVERB_APP_SECRET: REPLACE_WITH_REVERB_APP_SECRET
