apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: liberu-maintenance-policy
  namespace: liberu-maintenance
  labels:
    app: liberu-maintenance
spec:
  podSelector:
    matchLabels:
      app: liberu-maintenance
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from NGINX Ingress Controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8000
    # Allow Reverb WebSocket traffic from ingress
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 6001
    # Allow intra-namespace pod-to-pod communication
    - from:
        - podSelector:
            matchLabels:
              app: liberu-maintenance
  egress:
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow MySQL
    - to:
        - podSelector:
            matchLabels:
              app: liberu-maintenance
              component: mysql
      ports:
        - protocol: TCP
          port: 3306
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app: liberu-maintenance
              component: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow intra-namespace pod-to-pod communication
    - to:
        - podSelector:
            matchLabels:
              app: liberu-maintenance
    # Allow HTTPS egress for OAuth providers, mail, package registries, etc.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
