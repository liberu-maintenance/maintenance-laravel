apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: liberu-maintenance-policy
  namespace: liberu-maintenance
  labels:
    app: liberu-maintenance
spec:
  podSelector:
    matchLabels:
      app: liberu-maintenance
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 6001
    - from:
        - podSelector:
            matchLabels:
              app: liberu-maintenance
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 3306
        - protocol: TCP
          port: 6001
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: liberu-maintenance
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
