apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: liberu-maintenance
  namespace: liberu-maintenance
  labels:
    app: liberu-maintenance
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "liberu_maintenance_route"
    nginx.ingress.kubernetes.io/session-cookie-expires: "10800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "10800"
    nginx.ingress.kubernetes.io/limit-connections: "100"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - maintenance.example.com
      secretName: liberu-maintenance-tls
  rules:
    - host: maintenance.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: liberu-maintenance
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: liberu-maintenance-reverb
  namespace: liberu-maintenance
  labels:
    app: liberu-maintenance
    component: reverb
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ws.maintenance.example.com
      secretName: liberu-maintenance-reverb-tls
  rules:
    - host: ws.maintenance.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: maintenance-reverb
                port:
                  number: 6001
