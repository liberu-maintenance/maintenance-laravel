apiVersion: v1
kind: ConfigMap
metadata:
  name: maintenance-config
  namespace: liberu-maintenance
  labels:
    app: liberu-maintenance
data:
  APP_NAME: "Liberu Maintenance"
  APP_ENV: "production"
  APP_DEBUG: "false"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "info"
  DB_CONNECTION: "mysql"
  DB_HOST: "maintenance-mysql"
  DB_PORT: "3306"
  DB_DATABASE: "liberu_maintenance"
  CACHE_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  SESSION_DRIVER: "redis"
  REDIS_HOST: "maintenance-redis"
  REDIS_PORT: "6379"
  OCTANE_SERVER: "roadrunner"
  BROADCAST_CONNECTION: "reverb"
  FILESYSTEM_DISK: "local"
