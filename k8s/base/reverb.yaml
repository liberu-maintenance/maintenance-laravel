apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance-reverb
  namespace: liberu-maintenance
  labels:
    app: liberu-maintenance
    component: reverb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: liberu-maintenance
      component: reverb
  template:
    metadata:
      labels:
        app: liberu-maintenance
        component: reverb
    spec:
      containers:
        - name: reverb
          image: ghcr.io/liberu-maintenance/maintenance-laravel:latest
          command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=6001"]
          ports:
            - containerPort: 6001
              name: ws
          envFrom:
            - configMapRef:
                name: maintenance-config
            - secretRef:
                name: maintenance-secrets
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 6001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 6001
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: maintenance-storage
      securityContext:
        fsGroup: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: maintenance-reverb
  namespace: liberu-maintenance
  labels:
    app: liberu-maintenance
    component: reverb
spec:
  type: ClusterIP
  ports:
    - port: 6001
      targetPort: 6001
      protocol: TCP
      name: ws
  selector:
    app: liberu-maintenance
    component: reverb
