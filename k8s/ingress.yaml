apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: liberu-maintenance-ingress
  namespace: liberu-maintenance
  labels:
    app.kubernetes.io/name: liberu-maintenance
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "420m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - maintenance.liberu.co.uk
      secretName: liberu-maintenance-tls
  rules:
    - host: maintenance.liberu.co.uk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: liberu-maintenance-app
                port:
                  name: http
