apiVersion: v1
kind: Service
metadata:
  name: liberu-maintenance-app
  namespace: liberu-maintenance
  labels:
    app.kubernetes.io/name: liberu-maintenance
    app.kubernetes.io/component: app
spec:
  selector:
    app: liberu-maintenance-app
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: liberu-maintenance-reverb
  namespace: liberu-maintenance
  labels:
    app.kubernetes.io/name: liberu-maintenance
    app.kubernetes.io/component: reverb
spec:
  selector:
    app: liberu-maintenance-reverb
  ports:
    - name: ws
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
