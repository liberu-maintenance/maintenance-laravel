[supervisord]
nodaemon=true
user=%(ENV_USER)s
logfile=/dev/null
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:reverb]
process_name=%(program_name)s_%(process_num)s
command=php %(ENV_ROOT)s/artisan reverb:start --host=0.0.0.0
user=%(ENV_USER)s
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
minfds=10000
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[include]
files=/etc/supervisord.conf
